name: CoinTrend Digest

on:
  schedule:
    # 8:00 và 20:00 giờ Việt Nam = 1:00 và 13:00 UTC
    - cron: "0 1,13 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run digest bot
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/digest_bot.py
